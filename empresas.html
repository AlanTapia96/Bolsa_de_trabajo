<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de trabajo - Dejar datos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand navbar-a" href="index.html">Inicio</a>
            <a class="navbar-brand ml-auto" href="php/admin/loginAdmin.php"><button class="btn btn-light">Admin login</button></a>
        </div>
      </nav>


    <div class="container mt-5">
        <h1>Forlmuario de inscripción para empresas</h1>
        <p>Por favor, indique los datos de la empresa ofertante</p>
        <div class="alert" id="messages"></div>
        <form id="comp-form">   
        <hr />
            <div class="form-group">
                <label for="comp-name">Nombre de la empresa:</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                      <div class="input-group-text"><i class="fas fa-user"></i></div>
                    </div>
                    <input type="text" class="form-control" placeholder="Nombre" id="comp-name" name="comp-name" required />               
                </div>
            </div>
            <div class="form-group">
                <label for="cuit">CUIT</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                      <div class="input-group-text"><i class="fas fa-user"></i></div>
                    </div>
                    <input type="number" class="form-control" placeholder="CUIT" id="cuit" name="cuit" required />               
                </div>
            </div>
            <div class="form-group">
                <div class="row">
                    <div class="col-6">
                        <label for="province">Provincia</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                              <div class="input-group-text"><i class="fas fa-user"></i></div>
                            </div>
                            <input type="text" class="form-control" placeholder="Provincia" id="province" name="province" required />   
                            </div>
                        </div>
                    <div class="col-6">
                        <label for="district">Localidad</label>
                        <input type="text" class="form-control" placeholder="Localidad" id="district" name="district" required />   
                              
                    </div>
                </div>
            </div>       
            <div class="form-group">
                <label for="address">Dirección</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                      <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                    </div>
                    <input type="text" class="form-control" id="address" name="address" placeholder="Dirección" required />               
                </div>
            </div>
            <div class="form-group">
                <label for="phone">Teléfono</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                      <div class="input-group-text"><i class="fas fa-mobile-alt"></i></div>
                    </div>
                    <input type="text" class="form-control" id="phone" name="phone" placeholder="Teléfono" required />               
                </div>
            </div> 
            <div class="form-group">
                <label for=>Email</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                      <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                    </div>
                    <input type="email" class="form-control" id="mail" name="mail" placeholder="su@email" required />               
                </div>
            </div>
            <hr />
            <button type="submit" id="send-comp" name="send" class="btn btn-dark">Enviar</button>
        </form>
        <div id="respuesta"></div>
        
        <div class="my-5">
            <h2>Si ya se encuentra registrado, indique la propuesta laboral</h2>
            <form id="oferta" class="my-5">
                <div class="form-group">
                    <label for="prop-cuit">CUIT</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                        <div class="input-group-text"><i class="fas fa-user"></i></div>
                        </div>
                        <input type="number" class="form-control" placeholder="CUIT" id="prop-cuit" name="prop-cuit" required />               
                    </div>
                </div>
                    <div class="form-group">
                        <label for="subject">Propuesta laboral</label>
                        <textarea placeholder="Indique la propuesta laboral" id="subject" name="subject" class="form-control" required></textarea>
                    </div>
                    <div class="form-group">
                        <div class="row">
                            <div class="col-6">
                                <label for="date-st">Fecha inicio</label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                        <div class="input-group-text"><i class="fas fa-user"></i></div>
                                        </div>
                                        <input type="date" class="form-control" placeholder="Nombre" id="date-st" name="date-st" required />               
                                    </div>
                            </div>
                            <div class="col-6">
                                <div class="form-group">
                                    <label for="date-fin">Fecha fin</label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                        <div class="input-group-text"><i class="fas fa-user"></i></div>
                                        </div>
                                        <input type="date" class="form-control" placeholder="Nombre" id="date-fin" name="date-fin" required />               
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
        
                    <hr />
                    <button type="submit" id="send" name="send" class="btn btn-dark">Enviar</button>
                </form>
                <div id="respuesta-propuesta"></div>
               </div> 

        </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.js"integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk="crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous"></script>
<script src="js/registrarEmpresas-Propuestas.js"></script>
</body>
</html>
