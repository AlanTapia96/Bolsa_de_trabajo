<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista alumnos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand mr-auto" href="index.html">Inicio</a>
        <div class="container">
            
            <h4 class="navbar-brand lista-alumnos-h4">Listado de alumnos</h4>
            <ul class="navbar-nav ml-auto ul-form">
                <form class="form-inline my-2 my-lg-0">
                    <input type="search" id="search" class="form-control mr-sm-2" placeholder="Busque al alumno deseado">
                    <button class="btn btn-success my-2 my-sm-0" type="submit">
                        Buscar
                    </button>
                </form>
            </ul> 
        </div>
    </nav>


    <div class="m-5">
        <table class="table table-bordered table-lg table-responsive-lg">
            <thead class="thead-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Fecha de nacimiendo</th>
                    <th>Tipo de documento</th>
                    <th>Nro de documento</th>
                    <th>Teléfono</th>
                    <th>Mail</th>
                    <th>Carrera</th>
                    <th>Año de carrera</th>
                    <th>Experiencia</th>
                </tr>
            </thead>
            <tbody id="alumns"></tbody>

        </table>



    <script src="https://code.jquery.com/jquery-3.6.0.js"integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk="crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous"></script>
    <script src="js/getAlumnos.js"></script>
</body>
</html>
